name: Docs

on:
  push:
    branches: [master]
    paths:
      - 'docs-site/**'
      - 'app/src/wasmJsMain/**'
      - 'app/build.gradle.kts'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MkDocs Material
        run: pip install -r docs-site/requirements-docs.txt

      # Build the WASM playground from the :app module (development distribution — reliable without
      # the binaryen production-optimization step). The output is a self-contained dist folder
      # embedded into the MkDocs site so the playground iframe can load it.
      - name: Build WASM playground
        run: ./gradlew :app:wasmJsBrowserDevelopmentExecutableDistribution

      - name: Stage WASM playground for MkDocs
        run: |
          # MkDocs builds docs/ -> site/, so place the playground under docs/playground-dist to be
          # served at /playground-dist/. The distribution produces index.html + paletteWasm.js +
          # *.wasm.
          mkdir -p docs-site/docs/playground-dist
          cp -r app/build/dist/wasmJs/developmentExecutable/* docs-site/docs/playground-dist/

      - name: Build MkDocs site
        run: |
          cd docs-site
          mkdocs build --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
